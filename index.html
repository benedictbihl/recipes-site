<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bene & Iga Recipes</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f5ef;
        --surface: #fffdfa;
        --surface-strong: #fff8ec;
        --ink: #20211d;
        --muted: #6f7068;
        --line: #ded7ca;
        --accent: #267064;
        --accent-strong: #174c44;
        --tomato: #bf4e3a;
        --gold: #d39a2c;
        --shadow: 0 18px 50px rgba(42, 35, 22, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        overflow-x: clip;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 14% 8%, rgba(211, 154, 44, 0.18), transparent 28rem),
          linear-gradient(135deg, #f8f5ef 0%, #eef4ef 48%, #f8f1e5 100%);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
        overflow-x: hidden;
      }

      a {
        color: inherit;
      }

      .app {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        padding: 28px;
        border-right: 1px solid rgba(32, 33, 29, 0.12);
        background: rgba(255, 253, 250, 0.78);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .brand-mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-size: 24px;
      }

      h1 {
        margin: 0;
        font-size: 1.3rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .search {
        width: 100%;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font: inherit;
        outline: none;
      }

      .search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(38, 112, 100, 0.16);
      }

      .filter-group {
        margin-top: 22px;
      }

      .filter-group summary {
        list-style: none;
        cursor: pointer;
      }

      .filter-group summary::-webkit-details-marker {
        display: none;
      }

      .filter-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .filter-title::after {
        content: "⌄";
        color: var(--accent);
        font-size: 1rem;
        line-height: 1;
        transition: transform 0.18s ease;
      }

      .filter-group[open] .filter-title::after {
        transform: rotate(180deg);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 34px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 0.92rem;
      }

      .chip[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .main {
        min-width: 0;
        max-width: 100%;
        padding: 30px clamp(20px, 5vw, 64px) 48px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .count {
        color: var(--muted);
        font-weight: 700;
      }

      .layout {
        min-width: 0;
        max-width: 100%;
        display: grid;
        grid-template-columns: minmax(220px, 320px) minmax(0, 820px);
        gap: 24px;
        align-items: start;
      }

      .recipe-list {
        min-width: 0;
        max-width: 100%;
        display: grid;
        gap: 10px;
      }

      .recipe-button {
        width: 100%;
        min-height: 88px;
        padding: 14px;
        border: 1px solid rgba(32, 33, 29, 0.1);
        border-radius: 8px;
        background: rgba(255, 253, 250, 0.9);
        color: var(--ink);
        text-align: left;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(42, 35, 22, 0.07);
      }

      .recipe-button:focus-visible,
      .chip:focus-visible,
      .search:focus-visible {
        outline: 3px solid rgba(38, 112, 100, 0.22);
        outline-offset: 2px;
      }

      .recipe-button:hover,
      .recipe-button[aria-selected="true"] {
        border-color: rgba(38, 112, 100, 0.52);
        background: var(--surface-strong);
      }

      .recipe-title {
        display: block;
        font-weight: 850;
        line-height: 1.2;
      }

      .recipe-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .recipe-detail {
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        border: 1px solid rgba(32, 33, 29, 0.11);
        border-radius: 8px;
        background: rgba(255, 253, 250, 0.94);
        box-shadow: var(--shadow);
        overflow-wrap: anywhere;
      }

      .detail-header {
        padding: clamp(22px, 4vw, 34px);
        background:
          linear-gradient(135deg, rgba(38, 112, 100, 0.12), rgba(191, 78, 58, 0.1)),
          var(--surface-strong);
        border-bottom: 1px solid rgba(32, 33, 29, 0.1);
      }

      .detail-header h2 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3.1rem);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .detail-facts {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .fact {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--accent-strong);
        font-size: 0.9rem;
        font-weight: 750;
      }

      .detail-body {
        padding: clamp(22px, 4vw, 36px);
      }

      .detail-body h3 {
        margin: 30px 0 10px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        font-size: 1.15rem;
      }

      .detail-body h3:first-child {
        margin-top: 0;
        padding-top: 0;
        border-top: 0;
      }

      .detail-body ul,
      .detail-body ol {
        padding-left: 1.25rem;
      }

      .detail-body li {
        margin: 0.45rem 0;
      }

      .detail-body p {
        margin: 0.75rem 0;
      }

      .source {
        margin-top: 28px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .empty {
        padding: 24px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 250, 0.72);
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .app {
          display: block;
        }

        .sidebar {
          position: static;
          height: auto;
          padding: 16px;
          border-right: 0;
          border-bottom: 1px solid rgba(32, 33, 29, 0.12);
          background: rgba(255, 253, 250, 0.94);
          backdrop-filter: none;
        }

        .layout {
          display: flex;
          flex-direction: column;
          gap: 18px;
        }

        .recipe-list {
          width: 100%;
          display: flex;
          gap: 12px;
          margin: 0;
          padding: 2px 0 12px;
          overflow-x: auto;
          overscroll-behavior-x: contain;
          scroll-padding-inline: 0;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
        }

        .recipe-button {
          flex: 0 0 min(78vw, 320px);
          width: auto;
          min-height: 112px;
          scroll-snap-align: start;
        }
      }

      @media (max-width: 560px) {
        body {
          background: linear-gradient(180deg, #fffdfa 0%, #eef4ef 54%, #f8f1e5 100%);
        }

        .brand {
          margin-bottom: 14px;
        }

        h1 {
          font-size: 1.12rem;
        }

        .subtitle {
          font-size: 0.82rem;
        }

        .search {
          min-height: 46px;
        }

        .filter-group {
          margin-top: 14px;
        }

        .filter-group:not([open]) {
          margin-top: 10px;
        }

        .chips {
          max-width: 100%;
          padding-bottom: 2px;
          flex-wrap: nowrap;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }

        .chip {
          flex: 0 0 auto;
          white-space: nowrap;
        }

        .main {
          padding: 16px 14px 36px;
        }

        .toolbar {
          position: sticky;
          top: 0;
          z-index: 2;
          align-items: flex-start;
          flex-direction: column;
          gap: 4px;
          margin: 0 -14px 14px;
          padding: 10px 14px;
          border-bottom: 1px solid rgba(32, 33, 29, 0.1);
          background: rgba(248, 245, 239, 0.94);
          backdrop-filter: blur(12px);
        }

        .brand-mark {
          width: 40px;
          height: 40px;
        }

        .recipe-list {
          padding-inline: 0;
          scroll-padding-inline: 0;
        }

        .recipe-button {
          flex-basis: min(78vw, 280px);
        }

        .recipe-title {
          font-size: 0.98rem;
        }

        .recipe-meta {
          font-size: 0.78rem;
        }

        .detail-header h2 {
          font-size: 1.65rem;
        }

        .detail-header,
        .detail-body {
          padding: 20px 16px;
        }

        .detail-facts {
          gap: 7px;
          margin-top: 14px;
        }

        .fact {
          padding: 6px 9px;
          font-size: 0.82rem;
        }

        .detail-body ul,
        .detail-body ol {
          padding-left: 1.1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">🍳</div>
          <div>
            <h1>Bene & Iga Recipes</h1>
            <p class="subtitle">Markdown-Rezepte, schnell durchsuchbar.</p>
          </div>
        </div>

        <input
          id="search"
          class="search"
          type="search"
          autocomplete="off"
          placeholder="Suchen: Pasta, Tofu, quick..."
        />

        <details class="filter-group" open>
          <summary class="filter-title">Kategorie</summary>
          <div id="categoryFilters" class="chips"></div>
        </details>

        <details class="filter-group" open>
          <summary class="filter-title">Tags</summary>
          <div id="tagFilters" class="chips"></div>
        </details>
      </aside>

      <main class="main">
        <div class="toolbar">
          <div>
            <strong>Rezepte</strong>
            <span id="count" class="count"></span>
          </div>
          <span id="activeFilter" class="count"></span>
        </div>

        <div class="layout">
          <section id="recipeList" class="recipe-list" aria-label="Rezepte"></section>
          <article id="recipeDetail" class="recipe-detail" aria-live="polite"></article>
        </div>
      </main>
    </div>

    <script>
      const state = {
        recipes: [],
        query: "",
        category: "all",
        tag: "all",
        selectedSlug: "",
      };

      const els = {
        search: document.querySelector("#search"),
        categoryFilters: document.querySelector("#categoryFilters"),
        tagFilters: document.querySelector("#tagFilters"),
        recipeList: document.querySelector("#recipeList"),
        recipeDetail: document.querySelector("#recipeDetail"),
        count: document.querySelector("#count"),
        activeFilter: document.querySelector("#activeFilter"),
      };

      const labels = {
        breakfast: "Frühstück",
        lunch: "Lunch",
        dinner: "Dinner",
        snacks: "Snacks",
        baking: "Backen",
        sides: "Beilagen",
      };

      function pretty(value) {
        return labels[value] || value.replace(/-/g, " ");
      }

      function metaParts(recipe) {
        return [
          pretty(recipe.category),
          recipe.prepTime && `Prep ${recipe.prepTime}`,
          recipe.cookTime && `Cook ${recipe.cookTime}`,
          recipe.serves,
        ].filter(Boolean);
      }

      function chip(container, label, value, current, onClick) {
        const button = document.createElement("button");
        button.className = "chip";
        button.type = "button";
        button.textContent = label;
        button.setAttribute("aria-pressed", String(value === current));
        button.addEventListener("click", () => onClick(value));
        container.appendChild(button);
      }

      function renderFilters(data) {
        els.categoryFilters.innerHTML = "";
        els.tagFilters.innerHTML = "";

        chip(els.categoryFilters, "Alle", "all", state.category, (value) => {
          state.category = value;
          render();
        });
        data.categories.forEach((category) =>
          chip(els.categoryFilters, pretty(category), category, state.category, (value) => {
            state.category = value;
            render();
          }),
        );

        chip(els.tagFilters, "Alle", "all", state.tag, (value) => {
          state.tag = value;
          render();
        });
        data.tags.slice(0, 18).forEach((tag) =>
          chip(els.tagFilters, `#${tag}`, tag, state.tag, (value) => {
            state.tag = value;
            render();
          }),
        );
      }

      function filteredRecipes() {
        const query = state.query.trim().toLowerCase();
        return state.recipes.filter((recipe) => {
          const categoryMatch = state.category === "all" || recipe.category === state.category;
          const tagMatch = state.tag === "all" || recipe.tags.includes(state.tag);
          const queryMatch = !query || recipe.searchText.includes(query);
          return categoryMatch && tagMatch && queryMatch;
        });
      }

      function renderList(recipes) {
        els.recipeList.innerHTML = "";
        recipes.forEach((recipe) => {
          const button = document.createElement("button");
          button.className = "recipe-button";
          button.type = "button";
          button.setAttribute("aria-selected", String(recipe.slug === state.selectedSlug));
          button.innerHTML = `
            <span class="recipe-title">${recipe.title}</span>
            <span class="recipe-meta">${metaParts(recipe)
              .map((part) => `<span>${part}</span>`)
              .join("")}</span>
          `;
          button.addEventListener("click", () => {
            state.selectedSlug = recipe.slug;
            render();
            if (window.matchMedia("(max-width: 900px)").matches) {
              els.recipeDetail.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
          els.recipeList.appendChild(button);
        });
      }

      function renderDetail(recipe) {
        if (!recipe) {
          els.recipeDetail.className = "empty";
          els.recipeDetail.innerHTML = "Kein Rezept gefunden. Filter lockern oder Suche ändern.";
          return;
        }

        els.recipeDetail.className = "recipe-detail";
        const facts = [
          pretty(recipe.category),
          recipe.cuisine,
          recipe.prepTime && `Prep ${recipe.prepTime}`,
          recipe.cookTime && `Cook ${recipe.cookTime}`,
          recipe.serves,
          recipe.diet,
        ].filter(Boolean);

        els.recipeDetail.innerHTML = `
          <header class="detail-header">
            <h2>${recipe.title}</h2>
            <div class="detail-facts">
              ${facts.map((fact) => `<span class="fact">${fact}</span>`).join("")}
            </div>
          </header>
          <div class="detail-body">
            ${recipe.html}
            <p class="source">Quelle: <code>${recipe.sourcePath}</code></p>
          </div>
        `;
      }

      function render() {
        renderFilters(window.recipeData);
        const recipes = filteredRecipes();
        if (!recipes.some((recipe) => recipe.slug === state.selectedSlug)) {
          state.selectedSlug = recipes[0]?.slug || "";
        }
        els.count.textContent = `(${recipes.length}/${state.recipes.length})`;
        els.activeFilter.textContent = [
          state.category !== "all" && pretty(state.category),
          state.tag !== "all" && `#${state.tag}`,
        ]
          .filter(Boolean)
          .join(" · ");
        renderList(recipes);
        renderDetail(recipes.find((recipe) => recipe.slug === state.selectedSlug));
      }

      async function init() {
        const response = await fetch("recipes.json", { cache: "no-store" });
        window.recipeData = await response.json();
        state.recipes = window.recipeData.recipes;
        state.selectedSlug = state.recipes[0]?.slug || "";
        const mobileQuery = window.matchMedia("(max-width: 560px)");
        const syncFilterState = () => {
          document.querySelectorAll(".filter-group").forEach((group) => {
            group.open = !mobileQuery.matches;
          });
        };
        syncFilterState();
        mobileQuery.addEventListener("change", syncFilterState);
        els.search.addEventListener("input", (event) => {
          state.query = event.target.value;
          render();
        });
        render();
      }

      init().catch((error) => {
        els.recipeDetail.className = "empty";
        els.recipeDetail.textContent = `Konnte Rezepte nicht laden: ${error.message}`;
      });
    </script>
  </body>
</html>
